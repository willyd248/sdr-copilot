<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SDR Copilot — Dashboard</title>
  <style>
    :root {
      --bg: #111319;
      --surface: #1e1f26;
      --surface-2: #191b22;
      --surface-hover: #282a30;
      --border: rgba(66,71,84,0.15);
      --border-strong: rgba(66,71,84,0.3);
      --text: #e2e2eb;
      --text-2: #c2c6d6;
      --text-3: #8c909f;
      --accent: #4d8eff;
      --accent-dim: rgba(77,142,255,0.12);
      --accent-light: #adc6ff;
      --success: #10b981;
      --success-dim: rgba(16,185,129,0.12);
      --warning: #f59e0b;
      --warning-dim: rgba(245,158,11,0.12);
      --error: #ef4444;
      --error-dim: rgba(239,68,68,0.12);
      --purple: #8b5cf6;
      --cyan: #06b6d4;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      min-height: 100vh;
      line-height: 1.5;
    }

    /* Layout */
    .layout {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* Nav */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-logo {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: linear-gradient(135deg, #4d8eff, #adc6ff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .nav-title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .nav-subtitle {
      font-size: 12px;
      color: var(--text-3);
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .date-picker {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 7px 12px;
      font-family: var(--font);
      font-size: 13px;
      color: var(--text-2);
      cursor: pointer;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 7px;
      border: none;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
    }

    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-light); color: #002e6a; box-shadow: 0 0 0 3px rgba(77,142,255,0.25); }

    .btn-ghost {
      background: var(--surface);
      color: var(--text-2);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--surface-hover); color: var(--text); }

    /* Section headings */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .section-meta {
      font-size: 12px;
      color: var(--text-3);
    }

    /* ─── Stat Cards Grid ──────────────────────────────────────── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 32px;
    }

    @media (max-width: 768px) {
      .stat-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .stat-card:hover { border-color: var(--border-strong); }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--card-accent, var(--border));
      border-radius: 12px 12px 0 0;
    }

    .stat-icon {
      font-size: 18px;
      margin-bottom: 10px;
      display: block;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-2);
    }

    .stat-delta {
      font-size: 11px;
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .stat-delta.up { color: var(--success); }
    .stat-delta.down { color: var(--error); }
    .stat-delta.neutral { color: var(--text-3); }

    /* ─── Two-column content row ────────────────────────────────── */
    .content-row {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 20px;
      margin-bottom: 32px;
      align-items: start;
    }

    @media (max-width: 900px) {
      .content-row { grid-template-columns: 1fr; }
    }

    /* ─── Card ───────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .card-body { padding: 20px; }

    /* ─── Talk-time Widget ──────────────────────────────────────── */
    .talktime-bars {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .talktime-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .talktime-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .talktime-speaker {
      font-size: 12px;
      color: var(--text-2);
    }

    .talktime-pct {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
    }

    .bar-track {
      height: 6px;
      background: rgba(255,255,255,0.06);
      border-radius: 3px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.8s cubic-bezier(.4,0,.2,1);
    }

    .bar-you { background: var(--accent); }
    .bar-prospect { background: var(--success); }
    .bar-silence { background: var(--text-3); }

    /* Ideal ratio callout */
    .ratio-tip {
      margin-top: 14px;
      padding: 10px 12px;
      background: var(--accent-dim);
      border: 1px solid rgba(77,142,255,0.2);
      border-radius: 8px;
      font-size: 12px;
      color: #c7d2fe;
      line-height: 1.5;
    }

    /* ─── Objection Chart ───────────────────────────────────────── */
    .objection-chart {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .obj-bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .obj-bar-label {
      font-size: 12px;
      color: var(--text-2);
      width: 100px;
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .obj-bar-track {
      flex: 1;
      height: 8px;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
      overflow: hidden;
    }

    .obj-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 1s cubic-bezier(.4,0,.2,1);
    }

    .obj-bar-count {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      width: 24px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ─── Call List Table ───────────────────────────────────────── */
    .call-table {
      width: 100%;
      border-collapse: collapse;
    }

    .call-table th {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-3);
      text-align: left;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }

    .call-table td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      vertical-align: middle;
    }

    .call-table tbody tr:last-child td { border-bottom: none; }

    .call-table tbody tr:hover td { background: var(--surface-hover); }

    .call-prospect {
      font-weight: 500;
      color: var(--text);
    }

    .call-company {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 2px;
    }

    .call-duration { color: var(--text-2); }

    .call-objections {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .obj-tag {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 20px;
      background: rgba(255,255,255,0.07);
      color: var(--text-2);
    }

    .call-draft-link {
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
    }
    .call-draft-link:hover { color: var(--accent-hover); text-decoration: underline; }

    .call-outcome {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
    }
    .outcome-connected { background: var(--success-dim); color: var(--success); }
    .outcome-voicemail { background: rgba(255,255,255,0.06); color: var(--text-3); }
    .outcome-no-answer { background: rgba(255,255,255,0.06); color: var(--text-3); }

    /* ─── Follow-ups Section ────────────────────────────────────── */
    .followup-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .followup-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
    }

    .followup-check {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1.5px solid var(--border-strong);
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      transition: background 0.15s, border-color 0.15s;
    }

    .followup-check.done {
      background: var(--success);
      border-color: var(--success);
      color: white;
    }

    .followup-text { flex: 1; }
    .followup-meta { font-size: 11px; color: var(--text-3); white-space: nowrap; }

    /* ─── Empty State ───────────────────────────────────────────── */
    .empty-state {
      padding: 48px 20px;
      text-align: center;
    }

    .empty-state-icon {
      font-size: 36px;
      margin-bottom: 12px;
    }

    .empty-state-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .empty-state-desc {
      font-size: 13px;
      color: var(--text-3);
      max-width: 280px;
      margin: 0 auto 16px;
      line-height: 1.6;
    }

    /* ─── Demo banner ───────────────────────────────────────────── */
    .demo-banner {
      background: rgba(245,158,11,0.08);
      border: 1px solid rgba(245,158,11,0.2);
      border-radius: 9px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: #fbbf24;
      margin-bottom: 24px;
    }

    .demo-banner a {
      color: #fbbf24;
      font-weight: 600;
      cursor: pointer;
      text-decoration: underline;
    }

    /* ─── Loading skeleton ──────────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
      background-size: 200% 100%;
      animation: skeleton-shimmer 1.4s infinite;
      border-radius: 6px;
    }

    @keyframes skeleton-shimmer {
      from { background-position: 200% 0; }
      to   { background-position: -200% 0; }
    }

    /* ─── Responsive helpers ────────────────────────────────────── */
    .mb-32 { margin-bottom: 32px; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
  </style>
</head>
<body>
  <div class="layout">

    <!-- Nav -->
    <nav class="nav">
      <div class="nav-brand">
        <div class="nav-logo">⚡</div>
        <div>
          <div class="nav-title">SDR Copilot</div>
          <div class="nav-subtitle" id="nav-date">Loading…</div>
        </div>
      </div>
      <div class="nav-actions">
        <div class="date-picker" id="date-filter">
          <button class="btn btn-ghost" id="date-prev" style="padding:4px 8px;font-size:14px;">←</button>
          <span id="date-label" style="min-width:100px;text-align:center;">Today</span>
          <button class="btn btn-ghost" id="date-next" style="padding:4px 8px;font-size:14px;">→</button>
        </div>
        <button class="btn btn-ghost" id="export-btn">↗ Export</button>
        <button class="btn btn-primary" id="settings-btn">⚙ Settings</button>
      </div>
    </nav>

    <!-- Demo banner -->
    <div class="demo-banner" id="demo-banner" style="display:none">
      ⚡ Demo mode — showing sample data. <a id="banner-settings-link">Add your API keys</a> to see real call data.
    </div>

    <!-- Stat cards -->
    <div class="stat-grid" id="stat-grid">
      <div class="stat-card skeleton" style="--card-accent:#6366f1; height:110px;"></div>
      <div class="stat-card skeleton" style="--card-accent:#10b981; height:110px;"></div>
      <div class="stat-card skeleton" style="--card-accent:#f59e0b; height:110px;"></div>
      <div class="stat-card skeleton" style="--card-accent:#8b5cf6; height:110px;"></div>
    </div>

    <!-- Two-column: objections + talk time -->
    <div class="content-row mb-32">
      <!-- Objection chart -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">Objections Heard Today</span>
          <span class="section-meta" id="obj-total"></span>
        </div>
        <div class="card-body">
          <div class="objection-chart" id="objection-chart">
            <div class="skeleton" style="height:16px; margin-bottom:8px;"></div>
            <div class="skeleton" style="height:16px; margin-bottom:8px;"></div>
            <div class="skeleton" style="height:16px;"></div>
          </div>
        </div>
      </div>

      <!-- Talk-time widget -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">Talk Time Split</span>
        </div>
        <div class="card-body">
          <div class="talktime-bars" id="talktime-bars">
            <div class="skeleton" style="height:40px;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Follow-ups -->
    <div class="mb-32">
      <div class="section-header">
        <span class="section-title">Suggested Follow-ups</span>
        <span class="section-meta" id="followup-meta"></span>
      </div>
      <div id="followup-container">
        <div class="skeleton" style="height:44px; border-radius:8px; margin-bottom:6px;"></div>
        <div class="skeleton" style="height:44px; border-radius:8px;"></div>
      </div>
    </div>

    <!-- Call history table -->
    <div class="mb-32">
      <div class="section-header">
        <span class="section-title">Call History</span>
        <span class="section-meta" id="call-count-meta"></span>
      </div>
      <div class="card">
        <div id="call-history-container">
          <div class="skeleton" style="height:48px; border-radius:0;"></div>
          <div class="skeleton" style="height:48px; border-radius:0; margin-top:1px; opacity:0.6;"></div>
          <div class="skeleton" style="height:48px; border-radius:0; margin-top:1px; opacity:0.3;"></div>
        </div>
      </div>
    </div>

  </div><!-- /.layout -->

  <script src="dashboard.js"></script>
</body>
</html>
