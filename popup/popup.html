<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SDR Copilot</title>
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #171920;
      --surface-2: #1e2028;
      --surface-hover: #23252e;
      --border: rgba(255,255,255,0.07);
      --border-strong: rgba(255,255,255,0.13);
      --text: #e4e5f0;
      --text-2: #b8bdd0;
      --text-3: #6b7087;
      --accent: #4d8eff;
      --accent-dim: rgba(77,142,255,0.12);
      --accent-hover: #3a7af0;
      --success: #22c55e;
      --success-dim: rgba(34,197,94,0.12);
      --warning: #f59e0b;
      --warning-dim: rgba(245,158,11,0.12);
      --error: #ef4444;
      --radius: 8px;
      --radius-sm: 6px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.4;
      user-select: none;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 15px 11px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .logo-mark {
      width: 24px;
      height: 24px;
      border-radius: 7px;
      background: linear-gradient(140deg, #4d8eff 0%, #7c5cfc 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(77,142,255,0.3);
    }

    .logo-name {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 4px;
      padding: 2px 6px;
    }

    .badge-demo {
      background: var(--warning-dim);
      color: var(--warning);
      border: 1px solid rgba(245,158,11,0.25);
    }

    .version-tag {
      font-size: 10px;
      color: var(--text-3);
    }

    /* ── Call Banner (shown when Orum tab is active) ── */
    .call-banner {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 9px 15px;
      background: rgba(34,197,94,0.08);
      border-bottom: 1px solid rgba(34,197,94,0.15);
    }

    .call-banner.visible {
      display: flex;
    }

    .call-banner-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      flex-shrink: 0;
      animation: pulse 1.4s ease infinite;
    }

    .call-banner-text {
      font-size: 12px;
      color: var(--success);
      font-weight: 500;
    }

    /* ── Status Grid ── */
    .status-section {
      padding: 12px 15px;
      border-bottom: 1px solid var(--border);
    }

    .status-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 9px;
      background: var(--surface);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-3);
      flex-shrink: 0;
    }

    .status-dot.connected { background: var(--success); }
    .status-dot.active {
      background: var(--error);
      animation: pulse 1.4s ease infinite;
    }
    .status-dot.warning { background: var(--warning); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    .status-name {
      font-size: 11px;
      color: var(--text-3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-val {
      font-size: 10px;
      font-weight: 600;
      margin-left: auto;
      flex-shrink: 0;
      color: var(--text-3);
    }

    .status-val.ok { color: var(--success); }
    .status-val.warn { color: var(--warning); }

    /* ── Toggle row ── */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 15px;
      border-bottom: 1px solid var(--border);
    }

    .toggle-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-2);
    }

    .toggle {
      position: relative;
      width: 34px;
      height: 20px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background: var(--surface-2);
      border: 1px solid var(--border-strong);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .toggle-track::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--text-3);
      transition: transform 0.2s, background 0.2s;
    }

    .toggle input:checked + .toggle-track {
      background: var(--accent);
      border-color: var(--accent);
    }

    .toggle input:checked + .toggle-track::after {
      transform: translateX(14px);
      background: white;
    }

    /* ── API Key Form ── */
    .apikey-section {
      padding: 10px 15px 12px;
      border-bottom: 1px solid var(--border);
    }

    .field-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 6px;
    }

    .input-row {
      display: flex;
      gap: 5px;
    }

    .input-field {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      padding: 7px 10px;
      font-family: var(--font);
      font-size: 12px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      min-width: 0;
    }

    .input-field::placeholder { color: var(--text-3); }

    .input-field:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(77,142,255,0.15);
    }

    .save-msg {
      font-size: 11px;
      color: var(--success);
      margin-top: 5px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .save-msg.visible { opacity: 1; }

    /* ── Actions ── */
    .actions {
      padding: 10px 15px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      border-bottom: 1px solid var(--border);
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 9px 14px;
      border-radius: var(--radius-sm);
      border: none;
      font-family: var(--font);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      box-shadow: 0 0 0 3px rgba(77,142,255,0.2);
    }

    .btn-ghost {
      background: var(--surface);
      color: var(--text-2);
      border: 1px solid var(--border-strong);
    }

    .btn-ghost:hover {
      background: var(--surface-hover);
      color: var(--text);
      border-color: rgba(255,255,255,0.2);
    }

    .btn-sm {
      padding: 7px 11px;
      font-size: 11px;
      flex-shrink: 0;
    }

    .btn-row {
      display: flex;
      gap: 5px;
    }

    .btn-row .btn {
      flex: 1;
    }

    /* ── Footer ── */
    .footer {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 9px 15px;
    }

    .footer-link {
      font-size: 11px;
      color: var(--text-3);
      cursor: pointer;
      transition: color 0.15s;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .footer-link:hover { color: var(--text-2); }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-mark">⚡</div>
      <span class="logo-name">SDR Copilot</span>
    </div>
    <div class="header-right">
      <span class="badge badge-demo" id="demo-badge" style="display:none;">DEMO</span>
      <span class="version-tag" id="version-label">v1.1.0</span>
    </div>
  </div>

  <!-- Call banner (shown when Orum tab detected) -->
  <div class="call-banner" id="call-banner">
    <span class="call-banner-dot"></span>
    <span class="call-banner-text">Orum tab detected — overlay ready</span>
  </div>

  <!-- Status Grid -->
  <div class="status-section">
    <div class="status-grid">
      <div class="status-item">
        <span class="status-dot" id="si-orum"></span>
        <span class="status-name">Orum</span>
        <span class="status-val" id="sv-orum">—</span>
      </div>
      <div class="status-item">
        <span class="status-dot" id="si-deepgram"></span>
        <span class="status-name">Deepgram</span>
        <span class="status-val" id="sv-deepgram">—</span>
      </div>
      <div class="status-item">
        <span class="status-dot" id="si-google"></span>
        <span class="status-name">Gmail</span>
        <span class="status-val" id="sv-google">—</span>
      </div>
      <div class="status-item">
        <span class="status-dot" id="si-salesforce"></span>
        <span class="status-name">Salesforce</span>
        <span class="status-val" id="sv-salesforce">—</span>
      </div>
    </div>
  </div>

  <!-- Overlay Toggle -->
  <div class="toggle-row">
    <span class="toggle-label">Live overlay during calls</span>
    <label class="toggle">
      <input type="checkbox" id="overlay-toggle" checked />
      <span class="toggle-track"></span>
    </label>
  </div>

  <!-- Deepgram API Key -->
  <div class="apikey-section">
    <div class="field-label">Deepgram API Key</div>
    <div class="input-row">
      <input
        type="password"
        class="input-field"
        id="dg-key-input"
        placeholder="dg_xxxxxxxxxxxxxxxx"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="btn btn-ghost btn-sm" id="dg-save-btn">Save</button>
    </div>
    <div class="save-msg" id="dg-save-msg">✓ Saved — demo mode disabled</div>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="btn btn-primary" id="launch-demo-btn">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true"><path d="M3 2l7 4-7 4V2z" fill="white"/></svg>
      Watch Demo
    </button>
    <button class="btn btn-ghost" id="open-dashboard-btn">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true"><rect x="1" y="7" width="3" height="5" rx="1" fill="currentColor" opacity="0.7"/><rect x="5" y="4" width="3" height="8" rx="1" fill="currentColor" opacity="0.85"/><rect x="9" y="1" width="3" height="11" rx="1" fill="currentColor"/></svg>
      Open Dashboard
    </button>
    <div class="btn-row">
      <button class="btn btn-ghost" id="connect-google-btn">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true"><path d="M1 3.5A1.5 1.5 0 0 1 2.5 2h8A1.5 1.5 0 0 1 12 3.5v6A1.5 1.5 0 0 1 10.5 11h-8A1.5 1.5 0 0 1 1 9.5v-6z" stroke="currentColor" stroke-width="1.2"/><path d="M1 4l5.5 3.5L12 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        Gmail
      </button>
      <button class="btn btn-ghost" id="connect-sf-btn">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true"><path d="M6.5 1C4.015 1 2 3.015 2 5.5c0 1.38.614 2.617 1.587 3.457L3.5 12h6l-.087-3.043A4.496 4.496 0 0 0 11 5.5C11 3.015 8.985 1 6.5 1z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
        Salesforce
      </button>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="footer-link" id="open-options-link">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true"><circle cx="6.5" cy="6.5" r="2" stroke="currentColor" stroke-width="1.2"/><path d="M6.5 1v1.5M6.5 10.5V12M1 6.5h1.5M10.5 6.5H12M2.575 2.575l1.06 1.06M9.365 9.365l1.06 1.06M9.365 3.635l-1.06 1.06M3.635 9.365l-1.06 1.06" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      Settings
    </span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
